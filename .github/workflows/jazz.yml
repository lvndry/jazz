name: Jazz

on:
  pull_request:
    types: [opened, ready_for_review]
  workflow_dispatch:
    inputs:
      pull_request_number:
        description: "PR number (required when run from Actions tab)"
        required: true
        type: number
      job:
        description: "Which job to run"
        required: false
        default: assistant
        type: choice
        options:
          - code-review
          - assistant
      request:
        description: "Request to send to Jazz (assistant job only)"
        required: false
        type: string
  issue_comment:
    types: [created]

permissions:
  contents: read

jobs:
  resolve:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      issues: write
    outputs:
      pr_number: ${{ steps.resolve.outputs.pr_number }}
      base_sha: ${{ steps.resolve.outputs.base_sha }}
      head_sha: ${{ steps.resolve.outputs.head_sha }}
      pr_head_repo_full_name: ${{ steps.resolve.outputs.pr_head_repo_full_name }}
      request: ${{ steps.resolve.outputs.request }}
    steps:
      - name: Resolve PR context
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            function extractRequest(body) {
              if (!body) return '';
              const trimmed = body.trim();
              // Slash command avoids GitHub @-mention UX; exclude /jazz-review so review-only comments do not capture "-review…" as the request.
              const match = trimmed.match(/^\/jazz(?!-review)(?:\s*[:,-])?\s*([\s\S]*)/i);
              return match?.[1]?.trim() ?? '';
            }

            let prNumber, baseSha, headSha, prHeadRepoFullName;
            let request = '';

            if (context.payload.pull_request) {
              const pr = context.payload.pull_request;
              prNumber = pr.number;
              baseSha = pr.base.sha;
              headSha = pr.head.sha;
              prHeadRepoFullName = pr.head.repo.full_name;
            } else if (context.eventName === 'workflow_dispatch') {
              prNumber = Number(context.payload.inputs.pull_request_number);
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });
              baseSha = pr.base.sha;
              headSha = pr.head.sha;
              prHeadRepoFullName = pr.head.repo.full_name;
              request = String(context.payload.inputs.request ?? '').trim();
            } else {
              // issue_comment
              const issueNumber = context.payload.issue?.number;
              if (!issueNumber) {
                throw new Error('issue_comment event missing issue number');
              }
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: issueNumber,
              });
              prNumber = pr.number;
              baseSha = pr.base.sha;
              headSha = pr.head.sha;
              prHeadRepoFullName = pr.head.repo.full_name;
              request = extractRequest(context.payload.comment?.body);
            }

            if (!request) {
              request = 'Review this pull request and call out anything important.';
            }

            core.setOutput('pr_number', String(prNumber));
            core.setOutput('base_sha', baseSha);
            core.setOutput('head_sha', headSha);
            core.setOutput('pr_head_repo_full_name', prHeadRepoFullName);
            core.setOutput('request', request);

      - name: React with eyes on triggering comment
        if: |
          github.event_name == 'issue_comment' &&
          github.event.issue.pull_request != null &&
          contains(github.event.comment.body, '/jazz') && (
            github.event.comment.author_association == 'OWNER' ||
            github.event.comment.author_association == 'MEMBER' ||
            github.event.comment.author_association == 'COLLABORATOR'
          ) &&
          steps.resolve.outputs.pr_head_repo_full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const commentId = context.payload.comment?.id;
            if (!commentId) {
              core.warning('issue_comment event missing comment id; skipping reaction');
              return;
            }
            try {
              await github.rest.reactions.createForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: commentId,
                content: 'eyes',
              });
            } catch (e) {
              // Duplicate reaction (e.g. workflow re-run) returns 422
              if (e.status === 422) {
                core.info('Reaction already present or not applicable; continuing');
                return;
              }
              throw e;
            }

  # Automated code review — runs on PR open or when a trusted author comments /jazz-review.
  code-review:
    needs: resolve
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'code-review' && needs.resolve.outputs.pr_head_repo_full_name == github.repository) ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null && contains(github.event.comment.body, '/jazz-review') && (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      ) && needs.resolve.outputs.pr_head_repo_full_name == github.repository)
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.head_sha }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v8.1.0
        with:
          bun-version: latest

      - name: Install Jazz
        run: bun install -g jazz-ai

      - name: Setup Jazz agent and workflow
        env:
          PR_BASE_SHA: ${{ needs.resolve.outputs.base_sha }}
          PR_HEAD_SHA: ${{ needs.resolve.outputs.head_sha }}
          WORKSPACE: ${{ github.workspace }}
        run: |
          mkdir -p "$HOME/.jazz/agents" workflows/code-review
          cp .github/jazz/agents/ci-reviewer.json "$HOME/.jazz/agents/"
          sed -e "s/__PR_BASE_SHA__/$PR_BASE_SHA/g" -e "s/__PR_HEAD_SHA__/$PR_HEAD_SHA/g" -e "s|__WORKSPACE__|$WORKSPACE|g" \
            .github/jazz/workflows/code-review/WORKFLOW.md > workflows/code-review/WORKFLOW.md
          echo "--- Substituted workflow ---"
          cat workflows/code-review/WORKFLOW.md

      - name: Snapshot PR context
        # Pre-fetch PR metadata (title, body, labels, conversation comments,
        # review summaries, inline review comments) into a static JSON file the
        # agent reads via read_file. This avoids handing GITHUB_TOKEN to the
        # agent or shell while still letting it answer "what does the PR claim
        # to do? what's already been said in review?".
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          set -uo pipefail
          OUT=/tmp/jazz-pr-context.json
          if gh pr view "$PR_NUMBER" --repo "$REPO" \
               --json title,body,labels,comments,reviews \
               > /tmp/pr-base.json \
             && gh api "repos/$REPO/pulls/$PR_NUMBER/comments?per_page=100" \
                  > /tmp/pr-review-comments.json; then
            jq -s '.[0] + {reviewComments: .[1]}' \
              /tmp/pr-base.json /tmp/pr-review-comments.json > "$OUT"
          else
            echo '{"error":"Failed to fetch PR context; agent will proceed without it."}' > "$OUT"
          fi
          echo "--- PR context (first 200 lines) ---"
          head -n 200 "$OUT"

      - name: Run code review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          CI: "true"
          JAZZ_DISABLE_CATCH_UP: "1"
        run: |
          set -euo pipefail
          jazz --output raw workflow run code-review --auto-approve --agent ci-reviewer \
            | tee /tmp/jazz-review.txt

      - name: Post review comments
        if: always()
        env:
          PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
          PR_HEAD_SHA: ${{ needs.resolve.outputs.head_sha }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/jazz-review.txt', 'utf8');
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            const headSha = process.env.PR_HEAD_SHA;

            // Read model from agent config for display in review comment
            let modelLabel = '';
            try {
              const agent = JSON.parse(fs.readFileSync('.github/jazz/agents/ci-reviewer.json', 'utf8'));
              if (agent.model) modelLabel = `\n\n*Model: ${agent.model}*`;
            } catch (_) {}

            // Prefer the agent's four-backtick fence; fall back to a
            // last-occurrence scan of the three-backtick form so inner
            // ```diff/```ts samples in `body` don't truncate the wrapper.
            const extractFencedJson = (text) => {
              const fourFence = text.match(/````json\s*\n([\s\S]*?)\n?````/);
              if (fourFence) return fourFence[1].trim();

              const open = text.lastIndexOf('```json');
              if (open < 0) return null;
              const after = text.slice(open + '```json'.length);
              const close = after.lastIndexOf('```');
              if (close < 0) return null;
              return after.slice(0, close).trim();
            };

            let comments = [];
            const jsonText = extractFencedJson(output);
            if (jsonText) {
              try {
                comments = JSON.parse(jsonText);
              } catch (e) {
                console.log('Failed to parse JSON:', e.message);
              }
            }

            if (!Array.isArray(comments) || comments.length === 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: comments.length === 0
                  ? `## Jazz Code Review\n\nNo issues found.${modelLabel}`
                  : `## Jazz Code Review\n\n${output.slice(-60000) || '_No output from review._'}`
              });
              return;
            }

            // Sanitize and filter to valid inline comments
            // Normalize each comment: strip invalid start_line values early so they
            // never reach the API (start_line must be a positive int strictly less than line)
            const sanitized = comments.map(c => {
              const copy = { ...c };
              const validStartLine =
                Number.isInteger(copy.start_line) &&
                copy.start_line > 0 &&
                copy.start_line < copy.line;
              if (!validStartLine) delete copy.start_line;
              return copy;
            });
            const validComments = sanitized.filter(c =>
              c.path && c.line > 0 && !c.path.startsWith('/') && c.path !== 'NO_DIFF'
            );

            // Any comments that couldn't be posted inline become part of the review body
            const invalidComments = sanitized.filter(c => !validComments.includes(c));
            let reviewBody = `## Jazz Code Review\n\nFound ${comments.length} comment(s).${modelLabel}`;
            if (invalidComments.length > 0) {
              reviewBody += '\n\n### General Comments\n\n';
              reviewBody += invalidComments.map(c => `- ${c.body}`).join('\n');
            }

            if (validComments.length > 0) {
              // Fetch PR files to determine which are deleted and which lines are in the diff
              const { data: prFiles } = await github.rest.pulls.listFiles({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber
              });
              const deletedPaths = new Set(
                prFiles.filter((f) => f.status === 'removed').map((f) => f.filename)
              );

              // Build a map of valid diff lines per file (both LEFT and RIGHT sides)
              // by parsing the unified diff hunk headers from the patch field
              const diffLines = new Map(); // Map<path, { left: Set<number>, right: Set<number> }>
              for (const file of prFiles) {
                if (!file.patch) continue;
                const left = new Set();
                const right = new Set();
                const lines = file.patch.split('\n');
                let oldLine = 0;
                let newLine = 0;
                for (const line of lines) {
                  const hunkMatch = line.match(/^@@ -(\d+)(?:,\d+)? \+(\d+)(?:,\d+)? @@/);
                  if (hunkMatch) {
                    oldLine = parseInt(hunkMatch[1], 10);
                    newLine = parseInt(hunkMatch[2], 10);
                    continue;
                  }
                  // Skip diff metadata lines that are not actual file content
                  if (line.startsWith('\\ ')) continue;
                  if (line.startsWith('-')) {
                    left.add(oldLine);
                    oldLine++;
                  } else if (line.startsWith('+')) {
                    right.add(newLine);
                    newLine++;
                  } else {
                    // Context line — valid on both sides
                    left.add(oldLine);
                    right.add(newLine);
                    oldLine++;
                    newLine++;
                  }
                }
                diffLines.set(file.filename, { left, right });
              }

              // Check whether a comment's line (and start_line if present) is resolvable in the diff
              const isLineInDiff = (c) => {
                const fileDiff = diffLines.get(c.path);
                if (!fileDiff) return false;
                const side = deletedPaths.has(c.path) ? 'LEFT' : (c.side || 'RIGHT');
                const validSet = side === 'LEFT' ? fileDiff.left : fileDiff.right;
                if (!validSet.has(c.line)) return false;
                // Multi-line comments also send start_line which must be valid
                const hasStartLine =
                  Number.isInteger(c.start_line) && c.start_line > 0 && c.start_line < c.line;
                if (hasStartLine && !validSet.has(c.start_line)) return false;
                return true;
              };

              // Split comments into those that can be posted inline and those that cannot
              const inlineComments = validComments.filter(isLineInDiff);
              const unresolvedComments = validComments.filter(c => !isLineInDiff(c));

              if (unresolvedComments.length > 0) {
                console.log(`${unresolvedComments.length} comment(s) reference lines outside the diff and will be posted as general comments`);
                reviewBody += '\n\n### Comments on lines outside the diff\n\n';
                reviewBody += unresolvedComments.map(c => `- **${c.path}:${c.line}** — ${c.body}`).join('\n');
              }

              const mapComment = (c) => {
                const isDeleted = deletedPaths.has(c.path);
                const side = isDeleted ? 'LEFT' : (c.side || 'RIGHT');
                const hasValidRange =
                  Number.isInteger(c.start_line) &&
                  Number.isInteger(c.line) &&
                  c.start_line > 0 &&
                  c.start_line < c.line;
                return {
                  path: c.path,
                  line: c.line,
                  ...(hasValidRange && {
                    start_line: c.start_line,
                    start_side: side
                  }),
                  side,
                  body: c.body
                };
              };

              if (inlineComments.length > 0) {
                await github.rest.pulls.createReview({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  commit_id: headSha,
                  event: 'COMMENT',
                  body: reviewBody,
                  comments: inlineComments.map(mapComment)
                });
              } else {
                // All comments were outside the diff — post as a general comment instead
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body: reviewBody
                });
              }
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: reviewBody
              });
            }

  # On-demand PR assistant — triggered by a /jazz comment or manual workflow dispatch.
  assistant:
    needs: resolve
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: write
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'assistant' && needs.resolve.outputs.pr_head_repo_full_name == github.repository) ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null && contains(github.event.comment.body, '/jazz') &&
        !contains(github.event.comment.body, '/jazz-review') && (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      ) && needs.resolve.outputs.pr_head_repo_full_name == github.repository)
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.head_sha }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v8.1.0
        with:
          bun-version: latest

      - name: Install Jazz
        run: bun install -g jazz-ai

      - name: Setup Jazz agent and workflow
        env:
          PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
          PR_BASE_SHA: ${{ needs.resolve.outputs.base_sha }}
          PR_HEAD_SHA: ${{ needs.resolve.outputs.head_sha }}
          REQUEST: ${{ needs.resolve.outputs.request }}
          REPO: ${{ github.repository }}
          WORKSPACE: ${{ github.workspace }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.jazz/agents" workflows/pr-assistant
          cp .github/jazz/agents/pr-assistant.json "$HOME/.jazz/agents/"
          node - <<'NODE'
          const fs = require('fs');
          const template = fs.readFileSync('.github/jazz/workflows/pr-assistant/WORKFLOW.md', 'utf8');
          const replacements = {
            '__PR_NUMBER__': process.env.PR_NUMBER,
            '__PR_BASE_SHA__': process.env.PR_BASE_SHA,
            '__PR_HEAD_SHA__': process.env.PR_HEAD_SHA,
            '__REQUEST__': process.env.REQUEST,
            '__REPO__': process.env.REPO,
            '__WORKSPACE__': process.env.WORKSPACE,
          };
          let output = template;
          for (const [needle, value] of Object.entries(replacements)) {
            output = output.split(needle).join(value);
          }
          fs.writeFileSync('workflows/pr-assistant/WORKFLOW.md', output);
          NODE
          echo "--- Substituted workflow ---"
          cat workflows/pr-assistant/WORKFLOW.md

      - name: Snapshot PR context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          set -uo pipefail
          OUT=/tmp/jazz-pr-context.json
          if gh pr view "$PR_NUMBER" --repo "$REPO" \
               --json title,body,labels,comments,reviews \
               > /tmp/pr-base.json \
             && gh api "repos/$REPO/pulls/$PR_NUMBER/comments?per_page=100" \
                  > /tmp/pr-review-comments.json; then
            jq -s '.[0] + {reviewComments: .[1]}' \
              /tmp/pr-base.json /tmp/pr-review-comments.json > "$OUT"
          else
            echo '{"error":"Failed to fetch PR context; agent will proceed without it."}' > "$OUT"
          fi
          echo "--- PR context (first 200 lines) ---"
          head -n 200 "$OUT"

      - name: Run Jazz assistant
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          CI: "true"
          JAZZ_DISABLE_CATCH_UP: "1"
        run: |
          set -euo pipefail
          jazz --output raw workflow run pr-assistant --auto-approve --agent pr-assistant \
            2>&1 | tee /tmp/jazz-pr-assistant.txt

      - name: Post PR comment
        if: always()
        env:
          PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
          RUN_URL: ${{ format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/jazz-pr-assistant.txt', 'utf8');
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            const runUrl = process.env.RUN_URL;

            // Three-tier extraction. Strict: four-backtick markdown fence
            // (the contract). Lenient: three-backtick markdown via last-
            // occurrence scan. Fallback: any final fenced block, posted
            // with a header noting the agent broke the contract — better
            // than dumping the failure stub when the agent produced real
            // content but used the wrong language tag.
            const extractAnswer = (text) => {
              const fourMd = text.match(/````markdown\s*\n([\s\S]*?)\n?````/);
              if (fourMd) return { body: fourMd[1].trim(), strict: true };

              const open = text.lastIndexOf('```markdown');
              if (open >= 0) {
                const after = text.slice(open + '```markdown'.length);
                const close = after.lastIndexOf('```');
                if (close >= 0) return { body: after.slice(0, close).trim(), strict: true };
              }

              const fences = [...text.matchAll(/`{3,4}([a-zA-Z0-9_-]*)\n([\s\S]*?)\n`{3,4}/g)];
              const last = fences.pop();
              if (last) return { body: last[2].trim(), strict: false, lang: last[1] || 'unknown' };

              return null;
            };

            const extracted = extractAnswer(output);
            let commentBody;
            if (!extracted) {
              commentBody = `_The Jazz assistant didn't produce a usable answer. ` +
                `See the [workflow run](${runUrl}) for details._`;
            } else if (extracted.strict) {
              commentBody = extracted.body;
            } else {
              commentBody =
                `> _Heads up: the assistant didn't follow the markdown output ` +
                `contract (emitted a \`${extracted.lang}\` block instead). ` +
                `Surfacing the raw content below — see the ` +
                `[workflow run](${runUrl}) for full transcript._\n\n` +
                '```' + extracted.lang + '\n' + extracted.body + '\n```';
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `## Jazz PR Assistant\n\n${commentBody}`,
            });
